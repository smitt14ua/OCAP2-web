<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OCAP2 Map Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <h1>OCAP2 Map Tool</h1>
    </header>

    <main>
        <section id="upload-section">
            <div id="drop-zone">
                <p>Drop grad_meh ZIP here or <label for="file-input">click to upload</label></p>
                <input type="file" id="file-input" accept=".zip" hidden>
            </div>
        </section>

        <section id="tools-section">
            <h2>Tools</h2>
            <div id="tools-list"></div>
        </section>

        <section id="jobs-section" hidden>
            <h2>Active Job</h2>
            <div id="active-job"></div>
        </section>

        <section id="maps-section">
            <h2>Maps</h2>
            <table id="maps-table">
                <thead>
                    <tr>
                        <th></th>
                        <th>World</th>
                        <th>Size</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="maps-body"></tbody>
            </table>
            <p id="no-maps">No maps found</p>
        </section>
    </main>

    <img id="preview-popup" alt="">
    <script src="app.js"></script>
</body>
</html>
